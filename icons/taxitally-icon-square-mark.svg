<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img">
<title>TaxiTally icon mark</title>
<desc>Square red rounded icon with a centered double T monogram, no text, for small sizes.</desc>

<rect x="16" y="16" width="480" height="480" rx="96" fill="#C22B2B"/>

<!-- TT monogram, centered on x=256, y=256 -->
<rect x="146" y="196" width="100" height="30" rx="10" fill="#FFFFFF"/>
<rect x="182" y="196" width="30" height="132" rx="10" fill="#FFFFFF"/>
<rect x="226" y="196" width="100" height="30" rx="10" fill="#FFFFFF" opacity="0.9"/>
<rect x="262" y="196" width="30" height="132" rx="10" fill="#FFFFFF" opacity="0.9"/>

</svg>
